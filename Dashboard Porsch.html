function fill(id,f){
 let v=['Todos',...new Set(data.map(x=>x[f]))];
 document.getElementById(id).innerHTML=v.map(x=>`<option>${x}</option>`).join('');
}
fill('modelo','PorscheModelSanitized');
fill('ano','ModelYearSanitized');
fill('cidade','CitySanitized');
fill('pagamento','PayMethodSanitized');

function render(){
 let d=data.filter(r=>
 (modelo.value=='Todos'||r.PorscheModelSanitized==modelo.value)&&
 (ano.value=='Todos'||r.ModelYearSanitized==ano.value)&&
 (cidade.value=='Todos'||r.CitySanitized==cidade.value)&&
 (pagamento.value=='Todos'||r.PayMethodSanitized==pagamento.value));

 k1.innerHTML=d.length;
 k2.innerHTML='R$ '+d.reduce((a,b)=>a+(parseFloat(b.SalesPriceSanitized)||0),0).toLocaleString();
 k3.innerHTML=new Set(d.map(x=>x.CitySanitized)).size;
 k4.innerHTML=new Set(d.map(x=>x.PorscheModelSanitized)).size;

 let m={}; d.forEach(x=>m[x.PorscheModelSanitized]=(m[x.PorscheModelSanitized]||0)+1);
 Plotly.newPlot('top',[{x:Object.values(m),y:Object.keys(m),type:'bar',orientation:'h'}],{title:'Top Modelos'});

 let c={}; d.forEach(x=>c[x.CitySanitized]=(c[x.CitySanitized]||0)+1);
 Plotly.newPlot('cid',[{labels:Object.keys(c),values:Object.values(c),type:'pie'}],{title:'Vendas por Cidade'});

 let a={}; d.forEach(x=>a[x.ModelYearSanitized]=(a[x.ModelYearSanitized]||0)+1);
 Plotly.newPlot('anochart',[{x:Object.keys(a),y:Object.values(a),type:'bar'}],{title:'Ano Mais Vendido'});

 let e={}; d.forEach(x=>{let k=x.SaleDateSanitized.substring(0,7); e[k]=(e[k]||0)+1;});
 Plotly.newPlot('evol',[{x:Object.keys(e),y:Object.values(e),mode:'lines+markers'}],{title:'Pergunta 3 - Evolução das Vendas'});
}
['modelo','ano','cidade','pagamento'].forEach(i=>document.getElementById(i).onchange=render);
render();
